name: Stock Monitor Auto

on:
  schedule:
    # 平日の日本時間 9:00〜15:40の間、10分おきに実行
    - cron: '*/10 0-5 * * 1-5'
    - cron: '0-40/10 6 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4  # これを最新に維持
      - name: Pythonを準備
        uses: actions/setup-python@v5 # v4 から v5 に変更
        with:
          python-version: '3.10'
      - name: 必要な道具をインストール
        run: pip install requests beautifulsoup4
      - name: プログラムを実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 警告にあった最新の環境設定を念のため追加
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: python stock.py

if __name__ == "__main__":
    # ★テスト用にこの1行を追加して保存（Commit）する
    send_discord("🧪 SQ通知チャンネルのテスト送信です！")
    
    check_sq()
