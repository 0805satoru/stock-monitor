name: Stock Monitor Auto

on:
  schedule:
    # 平日の日本時間 9:00〜15:40の間、10分おきに実行
    # UTC（世界標準時）のため、日本時間から9時間引いた設定です
    - cron: '*/10 0-5 * * 1-5'
    - cron: '0-40/10 6 * * 1-5'
  workflow_dispatch: # 手動で動かすためのボタン

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4
      - name: Pythonを準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 必要な道具をインストール
        run: pip install requests beautifulsoup4
      - name: プログラムを実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python stock.py
